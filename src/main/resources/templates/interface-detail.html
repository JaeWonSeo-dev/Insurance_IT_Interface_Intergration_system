<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인터페이스 상세</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout detail-layout">
    <main class="content full">
        <section class="hero">
            <div>
                <h2 th:text="${item.interfaceCode + ' · ' + item.interfaceName}"></h2>
                <p th:text="${item.sourceSystem + ' → ' + item.targetSystem + ' / ' + item.channelType}"></p>
            </div>
            <div class="row-actions">
                <a class="button-link" th:href="@{/}">대시보드</a>
                <form th:action="@{'/interfaces/' + ${item.id} + '/deactivate'}" method="post">
                    <button type="submit" class="secondary">비활성화</button>
                </form>
                <form th:action="@{'/interfaces/' + ${item.id} + '/retry'}" method="post">
                    <button type="submit">재처리</button>
                </form>
            </div>
        </section>

        <section class="grid two-column">
            <article class="card">
                <div class="section-header">
                    <h3>인터페이스 정보 수정</h3>
                </div>
                <form th:action="@{'/interfaces/' + ${item.id} + '/update'}" th:object="${updateForm}" method="post" class="form-grid">
                    <label>
                        인터페이스명
                        <input type="text" th:field="*{interfaceName}">
                    </label>
                    <label>
                        출발 시스템
                        <input type="text" th:field="*{sourceSystem}">
                    </label>
                    <label>
                        대상 시스템
                        <input type="text" th:field="*{targetSystem}">
                    </label>
                    <label>
                        채널 유형
                        <select th:field="*{channelType}">
                            <option th:each="type : ${channelTypes}" th:value="${type}" th:text="${type}"></option>
                        </select>
                    </label>
                    <label>
                        연동 방향
                        <select th:field="*{direction}">
                            <option th:each="direction : ${directions}" th:value="${direction}" th:text="${direction}"></option>
                        </select>
                    </label>
                    <label>
                        상태
                        <select th:field="*{status}">
                            <option th:each="itemStatus : ${statuses}" th:value="${itemStatus}" th:text="${itemStatus}"></option>
                        </select>
                    </label>
                    <label>
                        담당 조직
                        <input type="text" th:field="*{ownerTeam}">
                    </label>
                    <label>
                        활성 여부
                        <select th:field="*{active}">
                            <option value="true">활성</option>
                            <option value="false">비활성</option>
                        </select>
                    </label>
                    <label class="full-width">
                        설명
                        <textarea th:field="*{description}" rows="4"></textarea>
                    </label>
                    <div class="actions full-width">
                        <button type="submit">수정 저장</button>
                    </div>
                </form>
            </article>

            <article class="card">
                <div class="section-header">
                    <h3>운영 상태 빠른 변경</h3>
                </div>
                <form th:action="@{'/interfaces/' + ${item.id} + '/status'}" th:object="${statusForm}" method="post" class="form-grid">
                    <label class="full-width">
                        상태
                        <select th:field="*{status}">
                            <option th:each="itemStatus : ${statuses}" th:value="${itemStatus}" th:text="${itemStatus}"></option>
                        </select>
                    </label>
                    <div class="actions full-width">
                        <button type="submit">상태 반영</button>
                    </div>
                </form>

                <div class="section-header" style="margin-top: 20px;">
                    <h3>실행 결과 반영</h3>
                </div>
                <form th:action="@{'/interfaces/' + ${item.id} + '/execute'}" th:object="${executeForm}" method="post" class="form-grid">
                    <label>
                        실행 결과
                        <select th:field="*{resultType}">
                            <option value="">선택</option>
                            <option value="SUCCESS">SUCCESS</option>
                            <option value="WARNING">WARNING</option>
                            <option value="FAILURE">FAILURE</option>
                        </select>
                    </label>
                    <label>
                        재처리 가능
                        <select th:field="*{retriable}">
                            <option value="">자동 판정</option>
                            <option value="true">가능</option>
                            <option value="false">불가</option>
                        </select>
                    </label>
                    <label class="full-width">
                        실행 메시지
                        <input type="text" th:field="*{message}" placeholder="예: 배치 처리 정상 완료 / 외부 응답 지연 발생">
                    </label>
                    <div class="actions full-width">
                        <button type="submit" class="secondary">실행 반영</button>
                    </div>
                </form>

                <div class="stats-list">
                    <div>
                        <span>성공 건수</span>
                        <strong th:text="${item.successCount}"></strong>
                    </div>
                    <div>
                        <span>실패 건수</span>
                        <strong th:text="${item.failureCount}"></strong>
                    </div>
                    <div>
                        <span>최근 실행 시간</span>
                        <strong th:text="${#temporals.format(item.lastExecutionAt, 'yyyy-MM-dd HH:mm:ss')}"></strong>
                    </div>
                </div>
            </article>
        </section>

        <section class="card">
            <div class="section-header">
                <h3>해당 인터페이스 장애/이벤트 로그</h3>
            </div>
            <div class="log-list">
                <article th:each="log : ${logs}" class="log-item">
                    <div>
                        <strong th:text="${log.message}"></strong>
                        <p th:text="${log.detail}"></p>
                    </div>
                    <div class="log-meta">
                        <span th:text="${#temporals.format(log.occurredAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
                        <span th:text="${log.retriable ? '재처리 가능' : '재처리 불가'}"></span>
                    </div>
                </article>
            </div>
        </section>

        <section class="card">
            <div class="section-header">
                <h3>실행 이력</h3>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>실행 시각</th>
                        <th>상태</th>
                        <th>결과</th>
                        <th>메시지</th>
                        <th>재처리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="execution : ${executions}">
                        <td th:text="${#temporals.format(execution.executedAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
                        <td th:text="${execution.status}"></td>
                        <td th:text="${execution.resultType}"></td>
                        <td th:text="${execution.message}"></td>
                        <td th:text="${execution.retried ? 'Y' : 'N'}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
