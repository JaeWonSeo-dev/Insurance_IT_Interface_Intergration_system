version: '3.9'
services:
  mysql:
    image: mysql:8.4
    container_name: insurance-if-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: insurance_ifdb
      MYSQL_USER: insurance
      MYSQL_PASSWORD: insurance1234
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
